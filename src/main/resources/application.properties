spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/revisa}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}

jwt.secret=${JWT_SECRET:dev-secret-change-me-dev-secret-change-me-123456789}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
jwt.issuer=${JWT_ISSUER:revisa-api}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
app.security.first-user-admin-enabled=${FIRST_USER_ADMIN_ENABLED:true}
app.demo-data-enabled=${DEMO_DATA_ENABLED:true}
