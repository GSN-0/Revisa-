spring.datasource.url=jdbc:h2:mem:revisatest;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

jwt.secret=test-secret-change-me-test-secret-change-me-123456789
jwt.expiration-ms=3600000
jwt.issuer=revisa-api-test

app.cors.allowed-origins=*
app.security.first-user-admin-enabled=true
app.demo-data-enabled=true
